<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="GC Golf"/>
  <meta name="theme-color" content="#1a472a"/>
  <title>The Georgia Club — Scoring</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="manifest" href="manifest.json"/>
</head>
<body>
  <div id="app"></div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, get, onValue, update }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ── REPLACE THIS BLOCK with your Firebase config ──────────────────────────
    const firebaseConfig = {
      apiKey:            "YOUR_API_KEY",
      authDomain:        "YOUR_PROJECT.firebaseapp.com",
      databaseURL:       "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
      projectId:         "YOUR_PROJECT",
      storageBucket:     "YOUR_PROJECT.appspot.com",
      messagingSenderId: "YOUR_SENDER_ID",
      appId:             "YOUR_APP_ID"
    };
    // ──────────────────────────────────────────────────────────────────────────

    const firebaseApp = initializeApp(firebaseConfig);
    const db = getDatabase(firebaseApp);
    window._db = db;
    window._dbRef = ref;
    window._dbSet = set;
    window._dbGet = get;
    window._dbOnValue = onValue;
    window._dbUpdate = update;
    window._firebaseReady = true;
    document.dispatchEvent(new Event("firebase-ready"));
  </script>

  <script src="js/data.js"></script>
  <script src="js/skins.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
